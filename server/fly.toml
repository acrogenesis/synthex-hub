# fly.toml app configuration file generated for synthex-hub on 2026-05-09T10:33:46-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'synthex-hub'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'
  release_command = '/app/bin/server eval Server.Release.migrate'

[env]
  DEFAULT_CHUNK_SIZE = '10'
  PORT = '4000'
  WAIT_FOR_DB = ''
  WORKER_HEARTBEAT_TIMEOUT_SECS = '120'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  # Sized for hosting the Oban-supervised CEGAR master in-process
  # alongside Bandit / the worker queue / live SSE fanout. Master
  # `score_bit` batches for high-dim envs (Ant ≈ 300 K candidates,
  # Humanoid larger) carry multi-MB payloads; even with the
  # in-process LocalScorer bypassing the JSON-to-self loop, the
  # transient Postgrex bind params for ~30 K chunk inserts plus the
  # 4-bit parallel wave dispatch routinely peak in the 800 MB–1 GB
  # range. 4 GB gives a 3× headroom over the observed peak and
  # leaves room for SSE / dashboard backpressure spikes.
  memory_mb = 4096
