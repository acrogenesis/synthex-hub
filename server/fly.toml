# fly.toml app configuration file generated for synthex-hub on 2026-05-09T10:33:46-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'synthex-hub'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'
  release_command = '/app/bin/server eval Server.Release.migrate'

[env]
  DEFAULT_CHUNK_SIZE = '10'
  PORT = '4000'
  WAIT_FOR_DB = ''
  WORKER_HEARTBEAT_TIMEOUT_SECS = '120'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  # Bumped from 512 MB to 2 GB. Master `score_bit` batches can carry
  # tens of thousands of candidate predicates; decoding the JSON body
  # in BEAM is roughly 5–10× the source size, so 30 MB raw → ~250 MB
  # transient allocation. 512 MB was OOM'ing the VM (returned as 502
  # to the client). 2 GB gives us a 100+ MB body headroom.
  memory_mb = 2048
